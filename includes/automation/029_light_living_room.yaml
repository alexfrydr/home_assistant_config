# -----------------------------------------------------------
# Автоматизации управления светом в гостинной
# -----------------------------------------------------------



- alias: "029_light_living_room_off"
  description: "Выключение подсветки в гостиной на рассвете"
  trigger:
    - platform: sun
      event: sunrise
  condition:
    - condition: state
      entity_id: input_boolean.auto_light_on_off_girlianda_ws2811
      state: "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: "on"
  action:
    - service: light.turn_off
      target:
        entity_id: light.wled
      data:
        transition: 3
    - delay: "00:00:08"
    # Повторная попытка + перезагрузка при неудаче
    - condition: state
      entity_id: light.wled
      state: ["on", "unavailable", "unknown"]
    - service: button.press
      target:
        entity_id: button.wled_restart
    - delay: "00:00:12"
    - service: telegram_bot.send_message
      data:
        message: "⚠️ Подсветка в гостиной не выключилась автоматически (статус: {{ states('light.wled') }})"
  mode: single

- alias: "029_light_living_room_30%"
  description: 'Изменение яркости подсветки по времени в 22:00'
  trigger:
  - platform: time
    at: '22:00:00'
  condition:
  - condition: state
    entity_id: input_boolean.auto_light_on_off_girlianda_ws2811
    state: 'on'
  - condition: state
    entity_id: input_boolean.control_mode
    state: 'on'
  - condition: and
    conditions:
      - condition: state
        entity_id:
            - light.wled
        match: any
        state: "on"
  action:
    - service: light.turn_on
      data:
        entity_id: light.wled
        brightness_pct: 30

- alias: "029_light_living_room_50%_on"
  description: "Включение подсветки в гостиной на закате"
  trigger:
    - platform: sun
      event: sunset
  condition:
    - condition: state
      entity_id: input_boolean.auto_light_on_off_girlianda_ws2811
      state: "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.wled
      data:
        brightness_pct: 50
        transition: 3
    - delay: "00:00:08"
    # Повторная попытка + перезагрузка при неудаче
    - condition: state
      entity_id: light.wled
      state: ["off", "unavailable", "unknown"]
    - service: button.press
      target:
        entity_id: button.wled_restart
    - delay: "00:00:12"
    - service: telegram_bot.send_message
      data:
        message: "⚠️ Подсветка в гостиной не включилась автоматически (статус: {{ states('light.wled') }})"
  mode: single

- alias: "029_light_living_room_turn_on_automatic"
  description: 'Применение пресета после сброса питания'
  trigger:
  - platform: state
    entity_id:
    - light.wled
    from: 'off'
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.auto_light_on_off_girlianda_ws2811
    state: 'on'
  - condition: state
    entity_id: input_boolean.control_mode
    state: 'on'
  action:
  - device_id: 74f618890967fe0de63bf749d22803b6
    domain: select
    entity_id: select.wled_preset
    type: select_option
    option: Preset 9
  mode: single
 
- alias: "029_light_living_room_Christmas_tree" 
  description: "Переключение пресетов на ёлке"
  mode: single
  triggers:
    - platform: time_pattern
      minutes: '/15'
  conditions:
    - condition: state
      entity_id: light.wled_strip_elka
      state:
        - "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: 'on'
  actions:
    - device_id: 182985d92d314295a2d7ab62fb6e8e44
      domain: select
      entity_id: 676b95a15a1e83e70c8f18a1d84105b2
      type: select_next
      cycle: true
      
- alias: "029_light_living_room_Christmas_tree_on_off_segment"
  description: "Синхронизация включения и отключения сегментов ёлки"
  triggers:
  - type: changed_states
    device_id: 182985d92d314295a2d7ab62fb6e8e44
    entity_id: e91d81394c721f6bc5108891f509ae37
    domain: light
    trigger: device
  conditions: 
    - condition: state
      entity_id: input_boolean.control_mode
      state: 'on'
  actions:
  - choose:
      - conditions:
          - condition: device
            type: is_on
            device_id: 182985d92d314295a2d7ab62fb6e8e44
            entity_id: e91d81394c721f6bc5108891f509ae37
            domain: light
        sequence:
          - type: turn_on
            device_id: 182985d92d314295a2d7ab62fb6e8e44
            entity_id: 97a89136eab9296309d8be1fcefd50ee
            domain: light
      - conditions:
          - condition: device
            type: is_off
            device_id: 182985d92d314295a2d7ab62fb6e8e44
            entity_id: e91d81394c721f6bc5108891f509ae37
            domain: light
        sequence:
          - type: turn_off
            device_id: 182985d92d314295a2d7ab62fb6e8e44
            entity_id: 97a89136eab9296309d8be1fcefd50ee
            domain: light
  mode: single

- alias: "029_light_living_room_Christmas_tree_elka_and_segment_95%"
  description: "Установкая яркости 95% сегментов ёлки"
  triggers:
  - type: turned_on
    device_id: 182985d92d314295a2d7ab62fb6e8e44
    entity_id: e91d81394c721f6bc5108891f509ae37
    domain: light
    trigger: device
  conditions:
    - condition: state
      entity_id: input_boolean.control_mode
      state: 'on'
  actions:
  - action: light.turn_on
    metadata: {}
    target:
      entity_id: light.wled_strip_elka
    data:
      brightness_pct: 95
  - action: light.turn_on
    metadata: {}
    data:
      brightness_pct: 95
    target:
      entity_id: light.wled_strip_elka_segment_1

