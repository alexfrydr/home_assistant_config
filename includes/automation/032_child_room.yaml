# -----------------------------------------------------------
# Автоматизации управления устройствами в детской
# -----------------------------------------------------------



- alias: "032_light_child_room_off"
  description: "Выключение подсветки в детской на рассвете"
  trigger:
    - platform: sun
      event: sunrise
  condition:
    - condition: state
      entity_id: input_boolean.auto_light_child_room
      state: "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: "on"
  action:
    - service: light.turn_off
      target:
        entity_id: light.wled_2
      data:
        transition: 3
    - delay: "00:00:08"
    # Повторная попытка + перезагрузка, если не выключилось
    - condition: state
      entity_id: light.wled_2
      state: ["on", "unavailable", "unknown"]
    - service: button.press
      target:
        entity_id: button.wled_strip_2_restart
    - delay: "00:00:12"
    - service: telegram_bot.send_message
      data:
        message: "⚠️ Подсветка в детской не выключилась автоматически (статус: {{ states('light.wled_2') }})"
  mode: single

- alias: "032_light_child_room_3%_strip_on_22:00"
  description: 'Изменение яркости подсветки в 22:00'
  trigger:
    - platform: time_pattern
      minutes: "/10"
  condition: 
    - condition: state
      entity_id: input_boolean.auto_light_child_room
      state: 'on'
    - condition: state
      entity_id: input_boolean.control_mode
      state: 'on'
    - condition: time
      after: '22:00:00'
    - condition: state
      entity_id: light.wled_2
      state: "on"
  action:
    - service: light.turn_on
      data:
        entity_id: light.wled_2
        brightness_pct: 15
              
- alias: "032_light_child_room_50%_on"
  description: "Включение подсветки в детской на закате"
  trigger:
    - platform: sun
      event: sunset
  condition:
    - condition: state
      entity_id: input_boolean.auto_light_child_room
      state: "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.wled_2
      data:
        brightness_pct: 50
        transition: 3
    - delay: "00:00:08"
    # Повтор + перезагрузка, если не включилось
    - condition: state
      entity_id: light.wled_2
      state: ["off", "unavailable", "unknown"]
    - service: button.press
      target:
        entity_id: button.wled_strip_2_restart
    - delay: "00:00:12"
    - service: telegram_bot.send_message
      data:
        message: "⚠️ Подсветка в детской не включилась автоматически (статус: {{ states('light.wled_2') }})"
  mode: single

- alias: "032_light_child_room_turn_on_automatic_wled_2"
  description: 'Применение пресета после сброса питания'
  trigger:
  - platform: state
    entity_id:
    - light.wled_2
    from: 'off'
    to: 'on'
  condition: 
  - condition: state
    entity_id: input_boolean.auto_light_child_room
    state: 'on'
  - condition: state
    entity_id: input_boolean.control_mode
    state: 'on'
  action:
  - device_id: c4a1f53e2bf2693166df40cc440eb622
    domain: select
    entity_id: select.wled_girlyanda_preset
    type: select_option
    option: Preset 8
  mode: single