# -----------------------------------------------------------
# Автоматизации управления освещением в спальне
# -----------------------------------------------------------



- alias: "033_light_bedroom_off"
  description: "Выключение подсветки в спальне на рассвете"
  trigger:
    - platform: sun
      event: sunrise
  condition:
    - condition: state
      entity_id: input_boolean.auto_light_bedroom_on_off
      state: "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: "on"
  action:
    - service: light.turn_off
      target:
        entity_id: light.wled_bedroom
      data:
        transition: 3
    - delay: "00:00:08"
    # Повторная попытка + перезагрузка при неудаче
    - condition: state
      entity_id: light.wled_bedroom
      state: ["on", "unavailable", "unknown"]
    - service: button.press
      target:
        entity_id: button.wled_bedroom_restart
    - delay: "00:00:12"
    - service: telegram_bot.send_message
      data:
        message: "⚠️ Подсветка в спальне не выключилась автоматически (статус: {{ states('light.wled_bedroom') }})"
  mode: single

- alias: "033_light_bedroom_3%_strip_on_22:00"
  description: 'Измение яркости после 22:00'
  trigger:
    - platform: time_pattern
      minutes: '/10'
  condition: 
    - condition: state
      entity_id: input_boolean.auto_light_bedroom_on_off
      state: 'on'
    - condition: state
      entity_id: input_boolean.control_mode
      state: 'on'
    - condition: time
      after: '22:00:00'
    - condition: state
      entity_id: light.wled_bedroom
      state: "on"
  action:
    - service: light.turn_on
      data:
        entity_id: light.wled_bedroom
        brightness_pct: 5

- alias: "033_light_bedroom_50%_on"
  description: "Включение подсветки в спальне на закате"
  trigger:
    - platform: sun
      event: sunset
  condition:
    - condition: state
      entity_id: input_boolean.auto_light_bedroom_on_off
      state: "on"
    - condition: state
      entity_id: input_boolean.control_mode
      state: "on"
  action:
    - service: light.turn_on
      target:
        entity_id: light.wled_bedroom
      data:
        brightness_pct: 25
        transition: 3
    - delay: "00:00:05"
    - service: select.select_option
      target:
        entity_id: select.wled_bedroom_preset
      data:
        option: "Preset 10"
    - delay: "00:00:08"
    # Повторная попытка + перезагрузка при неудаче
    - condition: state
      entity_id: light.wled_bedroom
      state: ["off", "unavailable", "unknown"]
    - service: button.press
      target:
        entity_id: button.wled_bedroom_restart
    - delay: "00:00:12"
    - service: telegram_bot.send_message
      data:
        message: "⚠️ Подсветка в спальне не включилась автоматически (статус: {{ states('light.wled_bedroom') }})"
  mode: single

- alias: "033_light_bedroom_turn_on_automatic_preset_3"
  description: 'Применение пресета после сброса питания'
  trigger:
  - platform: state
    entity_id:
    - light.wled_bedroom
    from: 'off'
    to: 'on'
  condition: 
  - condition: state
    entity_id: input_boolean.auto_light_bedroom_on_off
    state: 'on'
  - condition: state
    entity_id: input_boolean.control_mode
    state: 'on'
  action:
  - service: select.select_option
    data:
      option: Preset 10
    target:
      entity_id: select.wled_bedroom_preset
  - service: light.turn_on
    data:
      entity_id: light.wled_bedroom
      brightness_pct: 25
  mode: single
  