- sensor:
  - default_entity_id: sensor.ten_minutes_before_alarm
    name: Ten minutes before alarm
    state: >-
      {% set t_alarm = state_attr("input_datetime.alarm_clock", "timestamp") | int
      %} {% set t_start = states("sensor.timestamp_start_of_today") | int %} {% set
      before_alarm = t_alarm + t_start - 60 * 10 %} {{ before_alarm | timestamp_custom("%H:%M",
      True) }}
- sensor:
  - unit_of_measurement: s
    default_entity_id: sensor.timestamp_start_of_today
    state: >-
      {{ as_timestamp(now().replace(hour=0).replace(minute=0).replace(second=0)) }}
    name: timestamp_start_of_today
