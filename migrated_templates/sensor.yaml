- sensor:
  - default_entity_id: sensor.lg_tv_custom
    icon: mdi:clock
    name: Телевизор LG работал сегодня -
    state: >-
      {% set uptime = (states.sensor.lg_tv.state | float * 60) %} {% set minutes =
      ( uptime % 60) | int %} {% set hours = ((uptime % 1440) / 60) | int %} {% set
      days = (uptime / 1440) | int %}
        {% if uptime < 1 %}
          off
        {% else %}
          {% if days > 0 %}
            {{ days }} д.
          {% endif %}
          {% if hours > 0 %}
            {% if days > 0 %}
              {{ ' ' }}
            {% endif %}
            {{ hours }} ч.
          {% endif %}
          {% if minutes > 0 %}
            {% if days > 0 or hours > 0 %}
              {{ ' ' }}
            {% endif %}
              {{ minutes }} мин.
          {% endif %}
        {% endif %}
